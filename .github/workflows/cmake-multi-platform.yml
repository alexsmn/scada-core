# CI workflow for scada-core
# Builds and tests on Windows (MSVC) and Linux (GCC, Clang)
#
# Note: Full builds require external dependencies (ChromiumBase, promise-hpp, Net)
# that must be provided via CMAKE_PREFIX_PATH or installed system-wide.
# Build jobs are marked as allowed to fail until dependencies are configured.

name: CI

on:
  push:
    branches: [ "main", "release/**" ]
  pull_request:
    branches: [ "main", "release/**" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: ${{ matrix.os }} - ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    # Allow build to fail until external dependencies are configured
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            compiler: clang
            c_compiler: clang
            cpp_compiler: clang++
          - os: windows-latest
            compiler: msvc
            c_compiler: cl
            cpp_compiler: cl

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set build directory
      id: strings
      shell: bash
      run: |
        echo "build-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # Linux dependencies
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libboost-all-dev \
          libprotobuf-dev \
          protobuf-compiler \
          ninja-build

    # Windows dependencies via vcpkg
    - name: Setup vcpkg (Windows)
      if: runner.os == 'Windows'
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '01f602195983451bc83e72f4214af2cbc495aa94'

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        vcpkg install boost-system boost-date-time boost-json boost-log boost-program-options boost-filesystem boost-thread boost-atomic boost-context boost-regex --triplet x64-windows
        vcpkg install protobuf --triplet x64-windows

    # Cache CMake build
    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: ${{ steps.strings.outputs.build-dir }}
        key: ${{ matrix.os }}-${{ matrix.compiler }}-${{ env.BUILD_TYPE }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
        restore-keys: |
          ${{ matrix.os }}-${{ matrix.compiler }}-${{ env.BUILD_TYPE }}-

    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      run: >
        cmake -B ${{ steps.strings.outputs.build-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -G Ninja
        -S ${{ github.workspace }}

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: >
        cmake -B ${{ steps.strings.outputs.build-dir }}
        -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-dir }} --config ${{ env.BUILD_TYPE }} --parallel

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-dir }}
      run: ctest --build-config ${{ env.BUILD_TYPE }} --output-on-failure --parallel

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.compiler }}
        path: |
          ${{ steps.strings.outputs.build-dir }}/Testing/
          ${{ steps.strings.outputs.build-dir }}/**/*test*.log
        retention-days: 7

  # Static analysis job (Linux only) - primary CI check
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck

    - name: Run cppcheck
      run: |
        cppcheck --enable=warning,performance \
          --suppress=missingIncludeSystem \
          --suppress=missingInclude \
          --suppress=unmatchedSuppression \
          --suppress=unusedFunction \
          --suppress=useStlAlgorithm \
          --inline-suppr \
          --std=c++20 \
          -I base -I scada -I metrics -I model -I remote \
          --output-file=cppcheck-report.txt \
          base/ scada/ metrics/ model/ remote/ \
          2>&1 || true

        # Show report
        cat cppcheck-report.txt

        # Fail only on errors (not style/performance warnings)
        if grep -q "error:" cppcheck-report.txt; then
          echo "::error::cppcheck found errors"
          exit 1
        fi

    - name: Upload cppcheck report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cppcheck-report
        path: cppcheck-report.txt
        retention-days: 7
